trigger: none

pool:
  name: Default

variables:
  imageName: supriyoss18/demo-java-microservice-on-azure
  dockerRegistryServiceConnection: 'Dockerhub-connect'
  dockerfilePath: Dockerfile
  tag: $(Build.BuildId)
  containerAppName: java-app
  resourceGroup: techish-app-rg

stages:

# ---------------- BUILD STAGE ----------------
- stage: Build
  displayName: Build Image
  jobs:
  - job: BuildJob
    displayName: Build and Push Image
    steps:
    - checkout: self
    - task:  Maven@4
      inputs:
        goals: 'clean package'

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        repository: $(imageName)
        dockerfile: $(dockerfilePath)
        tags: $(tag)
        containerRegistry: $(dockerRegistryServiceConnection)

# ---------------- DEPLOY STAGE ----------------
- stage: Deploy
  displayName: Deploy to Azure Container Apps
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: DeployJob
    displayName: Deploy Container App

    steps:
    - task: AzureContainerApps@1
      displayName: Deploy new container version
      inputs:
        azureSubscription: 'azure-sp'
        imageToDeploy: '$(imageName):$(tag)'
        containerAppName: '$(containerAppName)'
        targetPort: '3500'
        ingress: 'external'
        resourceGroup: '$(resourceGroup)'
        containerAppEnvironment: 'java-microservice-env'
